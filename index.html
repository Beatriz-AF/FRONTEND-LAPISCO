<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clima Agora</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1 class="titulo">Consulta Meteorológica</h1>

        <div class="busca">
            <input type="text" placeholder="Digite uma cidade...">
            <button>Buscar</button>
        </div>

        <div class="card-clima">

            <div class="topo">
                <h2>Fortaleza</h2>
                <p id="descricao-clima"></p>
            </div>

            <div class="temperatura">
                29°C
            </div>

            <div class="detalhes">

                <div class="info">
                    <h3>Umidade</h3>
                    <p>72%</p>
                </div>

                <div class="info">
                    <h3>Vento</h3>
                    <p>18 km/h</p>
                </div>

                <div class="info">
                    <h3>Sensação</h3>
                    <p>31°C</p>
                </div>

            </div>

        </div>

        <div class="grafico-container">
            <h2>Previsão dos Próximos 7 Dias</h2>

            <canvas id="graficoTemperatura"></canvas>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


    <script src="script.js"></script>

</body>
</html>
