<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clima Agora</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="topo-site">
            <h1 class="titulo">Consulta Meteorológica</h1>
            <div class="area-tema">
                <p>Tema</p>
                <button id="toggleTema">🌙</button>
            </div>
        </div>

        <div class="busca">
            <input type="text" placeholder="Digite uma cidade...">
            <button>Buscar</button>
        </div>

        <div class="card-clima">

            <div class="topo">
                <h2>Fortaleza</h2>
                <p id="descricao-clima"></p>
            </div>

            <div class="temperatura">
                29°C
            </div>

            <div class="detalhes">

                <div class="info">
                    <h3>Umidade</h3>
                    <p>72%</p>
                </div>

                <div class="info">
                    <h3>Vento</h3>
                    <p>18 km/h</p>
                </div>

                <div class="info">
                    <h3>Sensação</h3>
                    <p>31°C</p>
                </div>

            </div>

        </div>

        <div class="layout-inferior">

            <div class="previsao-futura">

                <h2>Próximos Dias</h2>

                <div class="dias-container">

                    <div class="dia-card">
                        <h3>Seg</h3>
                        <p>☀️</p>
                        <span>32°C / 24°C</span>
                    </div>

                    <div class="dia-card">
                        <h3>Ter</h3>
                        <p>🌧️</p>
                        <span>29°C / 22°C</span>
                    </div>

                    <div class="dia-card">
                        <h3>Qua</h3>
                        <p>☁️</p>
                        <span>30°C / 23°C</span>
                    </div>

                    <div class="dia-card">
                        <h3>Qui</h3>
                        <p>☀️</p>
                        <span>33°C / 25°C</span>
                    </div>

                    <div class="dia-card">
                        <h3>Sex</h3>
                        <p>☀️</p>
                        <span>33°C / 25°C</span>
                    </div>

                    <div class="dia-card">
                        <h3>Sáb</h3>
                        <p>☀️</p>
                        <span>33°C / 25°C</span>
                    </div>

                </div>

            </div>

            <div class="grafico-container">
                <h2 class="titulo-grafico">Previsão dos Próximos 7 Dias</h2>
                <canvas id="graficoTemperatura"></canvas>
            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>

</body>
</html>
